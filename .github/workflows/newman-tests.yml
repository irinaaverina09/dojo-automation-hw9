name: Run Newman tests

on:
  workflow_dispatch:

jobs:
  api-testing:
    timeout-minutes: 2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.17.1'

      - name: Install newman
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      - name: Run Newman tests
        run: newman run Dojo.postman_collection.json -r htmlextra --reporter-htmlextra-export newman/report.html

      - name: Upload HTML report as artifact
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: newman-report
          path: newman/report.html
          retention-days: 7

      - name: Add HTML report to summary
        run: |
          echo "## Newman HTML Report" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Open Report</summary>" >> $GITHUB_STEP_SUMMARY
          cat newman/report.html >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
